# iso-claude egress allowlist. Reconciled into the container's live ipset by
# `iso-firewall` (host-side resolution → no rebuild, no restart, sessions keep
# running). Blank lines and '#' comments are ignored.
#
# Three kinds of entries:
#   @source   pull in a provider's PUBLISHED IPv4 ranges (see below)
#   1.2.3.0/24 or 1.2.3.4   raw IP/CIDR, used verbatim
#   example.com             hostname, resolved on the host via dig
#
# @directives are the robust way to allow CDN-fronted services whose per-domain
# DNS rotates across whole CDNs (crates.io flaps between Fastly and CloudFront,
# so resolving the hostname can never pin it). The tradeoff: these ranges are
# CDN-WIDE — @fastly allows *every* Fastly-hosted site, etc. Comment one out to
# tighten containment (you'd then need the specific hostnames, and accept flap).

@github          # git / gh / GitHub release downloads
@fastly          # covers crates.io, static/index.crates.io, pypi.org, files.pythonhosted.org
@cloudflare      # covers registry.npmjs.org (npm)
@aws-cloudfront  # crates.io's alternate front (AWS CloudFront)

# --- REQUIRED: Claude Code will not function without this ---
api.anthropic.com

# --- Anthropic telemetry (optional; safe to remove) ---
sentry.io
statsig.anthropic.com
statsig.com

# --- VS Code (optional; MS-hosted, resolved per-IP so may occasionally flap) ---
marketplace.visualstudio.com
vscode.blob.core.windows.net
update.code.visualstudio.com
