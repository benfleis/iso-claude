services:
  claude:
    build: .
    image: iso-claude
    container_name: iso-claude
    entrypoint: ["/usr/local/bin/entrypoint.sh"]
    command: ["sleep", "infinity"]

    # PID 1 (the entrypoint) MUST run as root so it can install the firewall.
    # Sessions get the host UID via `--user` on `docker compose exec` (see bin/).
    user: "0:0"

    volumes:
      # NOTE: mapping /opt/workspace -> /opt/workspace means tools like git
      # (which converts relative paths to absoluate, despite my efforts) work
      # both in, and outside of the docker; a useful property :)
      - "${CLAUDE_WORK_DIR:-/opt/workspace}:/opt/workspace"
      # Claude's durable state (config, auth, project trust, history, sessions)
      # lives on its own mount, NOT in /opt/workspace — keeps the workspace clean
      # and survives rebuilds. See CLAUDE_CONFIG_DIR below.
      - "${CLAUDE_STATE_DIR:-${HOME}/.config/iso-claude/state}:/home/iso-claude/.claude-state"
    working_dir: /opt/workspace

    environment:
      # HOME is the iso-claude user's real home (image-baked dotfiles + toolchains
      # resolve normally); Claude's state is redirected out to the mount above.
      - HOME=/home/iso-claude
      - CLAUDE_CONFIG_DIR=/home/iso-claude/.claude-state
      # The OAuth token (CLAUDE_CODE_OAUTH_TOKEN) is deliberately NOT declared here. 
      # A compose-level passthrough becomes container config, and can force rebuilds.
      # Instead rely on per session wrappers using -e CLAUDE_CODE_OAUTH_TOKEN 

    cap_drop: [ALL]
    cap_add: [NET_ADMIN, NET_RAW]
    security_opt:
      - no-new-privileges:true

    # Guardrails, not throttles — the intent is still to let sessions use
    # most/all of the box's resources. pids_limit only catches pathological
    # cases (fork bombs); no real build/test run spawns thousands of
    # concurrent processes. mem_limit is deliberately loose (small buffer
    # below total host RAM) rather than a real cap: without it, an OOM is
    # handled by the HOST kernel's OOM killer, which can pick anything on the
    # box (sshd, dockerd, iso-firewall's reconcile); with it, the container's
    # own cgroup OOM killer fires first and only kills processes inside the
    # sandbox. Kept loose because debug/ASan duckdb builds are known to be
    # memory-hungry at link time (mold was adopted specifically to make that
    # fit in RAM) — if a real build ever gets OOM-killed (exit 137) under this
    # cap, raise it further or drop it rather than assuming the build is at fault.
    pids_limit: 4096
    mem_limit: 13.5g

    restart: unless-stopped
